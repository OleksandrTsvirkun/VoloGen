title: VoloGen
description: Roslyn incremental source generators that eliminate boilerplate for value-object patterns in .NET.
url: "https://oleksandrtsvirkun.github.io"
baseurl: "/VoloGen"

remote_theme: pages-themes/hacker@v0.2.0

plugins:
  - jekyll-remote-theme

footer_content: >-
  Copyright &copy; 2026 Oleksandr Tsvirkun &mdash;
  Licensed under <a href="https://github.com/OleksandrTsvirkun/VoloGen/blob/main/LICENSE">MIT</a>.

kramdown:
  toc_levels: "2..3"
  tip:
    title: Tip
    color: green
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: red

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - "*.gemspec"
