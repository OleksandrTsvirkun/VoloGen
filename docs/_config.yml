title: VoloGen
description: Roslyn incremental source generators that eliminate boilerplate for value-object patterns in .NET.
url: "https://oleksandrtsvirkun.github.io"
baseurl: "/VoloGen"

remote_theme: just-the-docs/just-the-docs@v0.10.1

# Aux links (top-right)
aux_links:
  "GitHub":
    - "https://github.com/OleksandrTsvirkun/VoloGen"
  "NuGet":
    - "https://www.nuget.org/profiles/OleksandrTsvirkun"

aux_links_new_tab: true

# Footer
footer_content: >-
  Copyright &copy; 2025 Oleksandr Tsvirkun &mdash;
  Licensed under <a href="https://github.com/OleksandrTsvirkun/VoloGen/blob/main/LICENSE">MIT</a>.

# Color scheme
color_scheme: dark

# Search
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# Navigation
nav_sort: case_insensitive

# Back to top
back_to_top: true
back_to_top_text: "Back to top"

# Code copy
enable_copy_code_button: true

# Heading anchors
heading_anchors: true

# Callouts
callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: red

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - "*.gemspec"
