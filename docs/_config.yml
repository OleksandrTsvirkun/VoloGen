title: VoloGen
subtitle: Roslyn incremental source generators
description: >-
  Roslyn incremental source generators that eliminate boilerplate
  for value-object patterns in .NET.
url: "https://oleksandrtsvirkun.github.io"
baseurl: "/VoloGen"

remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "dark"

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache

repository: "OleksandrTsvirkun/VoloGen"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/OleksandrTsvirkun/VoloGen"
    - label: "NuGet"
      icon: "fas fa-fw fa-cube"
      url: "https://www.nuget.org/profiles/oleksandr.tsvirkun"

# Default front matter
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      sidebar:
        nav: "docs"
      toc: true
      toc_sticky: true

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - "*.gemspec"
